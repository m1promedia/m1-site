    video:"https://video.wixstatic.com/video/c166fc_b83113e12bd5443c884e8c27f18c6135/720p/mp4/file.mp4",
    cover:"https://static.wixstatic.com/media/c166fc_2bca91d5c30645e8ac5ef87a46051ed7~mv2.jpg",
    desc:"Photography, product shots and a targeted launch campaign for this premium face mask startup at the height of the pandemic. The work was featured in Forbes and on Global News."
  }
];

const photoLb = document.getElementById('photoLb');
const photoLbImg = document.getElementById('photoLbImg');
const photoLbCount = document.getElementById('photoLbCount');
let lbImages = [], lbIndex = 0;

function openPhotoLb(images, index) {
  lbImages = images; lbIndex = index;
  updatePhotoLb();
  photoLb.classList.add('is-open');
  document.body.style.overflow = 'hidden';
}
function updatePhotoLb() {
  photoLbImg.src = lbImages[lbIndex];
  photoLbCount.textContent = (lbIndex + 1) + ' / ' + lbImages.length;
  document.getElementById('photoLbPrev').style.display = lbImages.length > 1 ? 'flex' : 'none';
  document.getElementById('photoLbNext').style.display = lbImages.length > 1 ? 'flex' : 'none';
}
function closePhotoLb() {
  photoLb.classList.remove('is-open');
  photoLbImg.src = '';
  document.body.style.overflow = '';
}
document.getElementById('photoLbClose').addEventListener('click', closePhotoLb);
photoLb.addEventListener('click', e => { if (e.target === photoLb) closePhotoLb(); });
document.getElementById('photoLbPrev').addEventListener('click', e => { e.stopPropagation(); lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; updatePhotoLb(); });
document.getElementById('photoLbNext').addEventListener('click', e => { e.stopPropagation(); lbIndex = (lbIndex + 1) % lbImages.length; updatePhotoLb(); });
document.addEventListener('keydown', e => {
  if (!photoLb.classList.contains('is-open')) return;
  if (e.key === 'Escape') closePhotoLb();
  if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; updatePhotoLb(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % lbImages.length; updatePhotoLb(); }
});

function buildPhotoGrid(images, stageEl, wrapClass) {
  const grid = document.createElement('div');
  grid.className = 'm1-photo-grid' + (wrapClass ? ' ' + wrapClass : '');
  images.forEach((src, idx) => {
    const cell = document.createElement('div'); cell.className = 'm1-photo';
    const img = document.createElement('img'); img.src = src; img.loading = 'lazy';
    cell.appendChild(img);
    cell.addEventListener('click', () => openPhotoLb(images, idx));
    grid.appendChild(cell);
  });
  stageEl.appendChild(grid);
}

function buildExpandContent(p, stageEl) {
  stageEl.innerHTML = '';
  const hasMixed = p.media && p.media.length && p.images && p.images.length;

  if (hasMixed) {
    if (p.media.length === 1) {
      // Single video full width, then photo grid below
      const item = p.media[0];
      const vwrap = document.createElement('div'); vwrap.className = 'm1-expand-single';
      if (item.type === 'mp4') {
        const v = document.createElement('video');
        v.src = item.src; v.controls = true; v.playsInline = true;
        vwrap.appendChild(v);
      } else {
        const f = document.createElement('iframe');
        f.src = 'https://www.youtube-nocookie.com/embed/' + item.id + '?rel=0&modestbranding=1&playsinline=1';
        f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        f.allowFullscreen = true;
        vwrap.appendChild(f);
      }
      stageEl.appendChild(vwrap);
      buildPhotoGrid(p.images, stageEl, 'm1-mixed-photos');
    } else {
      // Multiple videos in grid with labels, then photo grid
      const videoLabel = document.createElement('div');
      videoLabel.className = 'm1-section-label'; videoLabel.textContent = 'Videos';
      stageEl.appendChild(videoLabel);
      const grid = document.createElement('div'); grid.className = 'm1-expand-videos';
      p.media.forEach(item => {
        const w = document.createElement('div'); w.className = 'm1-expand-video';
        if (item.type === 'mp4') {
          const v = document.createElement('video');
          v.src = item.src; v.controls = true; v.playsInline = true; w.appendChild(v);
        } else {
          const f = document.createElement('iframe');
          f.src = 'https://www.youtube-nocookie.com/embed/' + item.id + '?rel=0&modestbranding=1&playsinline=1';
          f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
          f.allowFullscreen = true; w.appendChild(f);
        }
        grid.appendChild(w);
      });
      stageEl.appendChild(grid);
      const photoLabel = document.createElement('div');
      photoLabel.className = 'm1-section-label'; photoLabel.textContent = 'Photos';
      stageEl.appendChild(photoLabel);
      buildPhotoGrid(p.images, stageEl, null);
    }

  } else if (p.videos && p.videos.length) {
    const grid = document.createElement('div'); grid.className = 'm1-expand-videos';
    p.videos.forEach(id => {
      const w = document.createElement('div'); w.className = 'm1-expand-video';
      const f = document.createElement('iframe');
      f.src = 'https://www.youtube-nocookie.com/embed/' + id + '?rel=0&modestbranding=1&playsinline=1';
      f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      f.allowFullscreen = true; w.appendChild(f); grid.appendChild(w);
    });
    stageEl.appendChild(grid);

  } else if (p.media && p.media.length === 1) {
    const item = p.media[0];
    const wrap = document.createElement('div'); wrap.className = 'm1-expand-single';
    if (item.type === 'mp4') {
      const v = document.createElement('video');
      v.src = item.src; v.controls = true; v.playsInline = true; wrap.appendChild(v);
    } else {
      const f = document.createElement('iframe');
      f.src = 'https://www.youtube-nocookie.com/embed/' + item.id + '?rel=0&modestbranding=1&playsinline=1';
      f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      f.allowFullscreen = true; wrap.appendChild(f);
    }
    stageEl.appendChild(wrap);

  } else if (p.media && p.media.length > 1) {
    const grid = document.createElement('div'); grid.className = 'm1-expand-videos';
    p.media.forEach(item => {
      const w = document.createElement('div'); w.className = 'm1-expand-video';
      if (item.type === 'mp4') {
        const v = document.createElement('video');
        v.src = item.src; v.controls = true; v.playsInline = true; w.appendChild(v);
      } else {
        const f = document.createElement('iframe');
        f.src = 'https://www.youtube-nocookie.com/embed/' + item.id + '?rel=0&modestbranding=1&playsinline=1';
        f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        f.allowFullscreen = true; w.appendChild(f);
      }
      grid.appendChild(w);
    });
    stageEl.appendChild(grid);

  } else if (p.images && p.images.length) {
    buildPhotoGrid(p.images, stageEl, null);
    if (p.video) {
      const vwrap = document.createElement('div'); vwrap.className = 'm1-expand-video-full';
      const v = document.createElement('video');
      v.src = p.video; v.controls = true; v.playsInline = true;
      vwrap.appendChild(v); stageEl.appendChild(vwrap);
    }
  }
}

const list = document.getElementById('m1List');

PROJECTS.forEach((p, i) => {
  const wrap = document.createElement('div'); wrap.className = 'm1-card-wrap m1-reveal';
  wrap.style.transitionDelay = ((i % 2) * 80) + 'ms';
  const card = document.createElement('div'); card.className = 'm1-card';
  card.innerHTML = '<div class="m1-card-media"><img class="m1-card-bg" src="' + p.cover + '" aria-hidden="true"><img class="m1-card-img m1-fit" loading="lazy" src="' + p.cover + '" alt="' + p.client + '"></div><div class="m1-card-body"><span class="m1-card-tag">' + p.category + '</span><div class="m1-card-name">' + p.client + '</div><p class="m1-card-desc">' + p.desc + '</p></div>';
  wrap.appendChild(card);

  card.addEventListener('mousemove', function(ev){
    const r = card.getBoundingClientRect();
    card.style.setProperty('--mx', (ev.clientX - r.left) + 'px');
    card.style.setProperty('--my', (ev.clientY - r.top) + 'px');
  });

  const arrow = document.createElement('div'); arrow.className = 'm1-arrow';
  arrow.innerHTML = '<div class="m1-arrow-wrap"><svg class="m1-arrow-icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>';

  const stageId = 'stage-' + i;
  const expand = document.createElement('div'); expand.className = 'm1-expand';
  expand.innerHTML = '<div class="m1-expand-inner"><div class="m1-expand-stage" id="' + stageId + '"></div><div class="m1-expand-close" id="close-' + i + '"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>Close</div></div>';

  wrap.appendChild(arrow); wrap.appendChild(expand); list.appendChild(wrap);

  function toggle() {
    const open = expand.classList.contains('is-open');
    if (open) {
      expand.classList.remove('is-open');
      card.classList.remove('expand-open');
      arrow.classList.remove('is-open');
      document.getElementById(stageId).innerHTML = '';
    } else {
      expand.classList.add('is-open');
      card.classList.add('expand-open');
      arrow.classList.add('is-open');
      buildExpandContent(p, document.getElementById(stageId));
    }
  }

  card.querySelector('.m1-card-media').addEventListener('click', toggle);
  arrow.addEventListener('click', toggle);
  document.getElementById('close-' + i).addEventListener('click', toggle);
});

/* Scroll reveal */
(function(){
  const reveals = document.querySelectorAll('.m1-reveal');
  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if (e.isIntersecting) {
          e.target.classList.add('is-in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
    reveals.forEach(function(el){ io.observe(el); });
  } else {
    reveals.forEach(function(el){ el.classList.add('is-in'); });
  }
})();
</script>
