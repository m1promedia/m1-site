<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Hanken+Grotesk:wght@400;500;600&display=swap');
  :root{--accent:#e0a64b;--bg:#0b0b0d;--surface:#141418;--text:#f4f1ea;--muted:#8d8d96;--line:rgba(255,255,255,.08);--radius:14px}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--text);font-family:'Hanken Grotesk',sans-serif;-webkit-font-smoothing:antialiased}
  .m1-root{padding:48px 24px 72px}
  .m1-wrap{max-width:1100px;margin:0 auto}
  .m1-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;line-height:.96;letter-spacing:-.02em;font-size:clamp(40px,7vw,82px);margin-bottom:20px}
  .m1-lede{color:var(--muted);font-size:clamp(15px,1.4vw,18px);max-width:520px;line-height:1.55;margin-bottom:46px}
  .m1-list{display:flex;flex-direction:column;gap:16px}
  .m1-card-wrap{display:flex;flex-direction:column}
  .m1-card{display:grid;grid-template-columns:42% 1fr;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;opacity:0;transform:translateY(18px);animation:m1in .55s cubic-bezier(.2,.7,.3,1) forwards}
  .m1-card.expand-open{border-radius:var(--radius) var(--radius) 0 0;border-bottom-color:transparent}
  @keyframes m1in{to{opacity:1;transform:none}}
  @media(max-width:640px){.m1-card{grid-template-columns:1fr}}
  .m1-card-media{position:relative;aspect-ratio:16/10;overflow:hidden;cursor:pointer;background:var(--bg)}
  @media(max-width:640px){.m1-card-media{aspect-ratio:16/9}}
  .m1-card-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(26px) brightness(.45) saturate(1.15);transform:scale(1.15)}
  .m1-card-img{position:absolute;inset:0;width:100%;height:100%;transition:transform .7s cubic-bezier(.2,.7,.3,1)}
  .m1-fit{object-fit:contain;padding:20px}
  .m1-cover{object-fit:cover;filter:saturate(.92) brightness(.82)}
  .m1-card-media:hover .m1-fit{transform:scale(1.04)}
  .m1-card-media:hover .m1-cover{transform:scale(1.06)}
  .m1-card-fallback{position:absolute;inset:0;background:radial-gradient(120% 120% at 0% 0%,rgba(224,166,75,.18),transparent 55%),linear-gradient(135deg,#1a1a20,#0e0e12)}
  .m1-arrow{display:flex;justify-content:center;align-items:center;padding:10px 0;cursor:pointer}
  .m1-arrow-wrap{transition:transform .45s cubic-bezier(.2,.7,.3,1);display:flex;align-items:center;justify-content:center}
  .m1-arrow.is-open .m1-arrow-wrap{transform:rotate(180deg)}
  .m1-arrow-icon{width:22px;height:22px;stroke:rgba(255,255,255,.35);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .25s}
  .m1-arrow:hover .m1-arrow-icon{stroke:rgba(255,255,255,.85)}
  .m1-arrow:not(.is-open):hover .m1-arrow-icon{animation:m1bob .9s ease-in-out infinite}
  .m1-arrow.is-open .m1-arrow-icon{stroke:rgba(255,255,255,.65)}
  @keyframes m1bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .m1-expand{overflow:hidden;max-height:0;opacity:0;background:var(--surface);border:1px solid var(--line);border-top:none;border-radius:0 0 var(--radius) var(--radius);transition:max-height .55s cubic-bezier(.2,.7,.3,1),opacity .35s ease}
  .m1-expand.is-open{max-height:6000px;opacity:1}
  .m1-expand-inner{padding:24px 28px 28px}
  .m1-expand-stage{position:relative;width:100%}
  .m1-expand-videos{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:640px){.m1-expand-videos{grid-template-columns:1fr}}
  .m1-expand-video{position:relative;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden}
  .m1-expand-video iframe,.m1-expand-video video{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
  .m1-expand-video-full{position:relative;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;margin-top:12px}
  .m1-expand-video-full video{position:absolute;inset:0;width:100%;height:100%;background:#000}
  .m1-expand-single{position:relative;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden}
  .m1-expand-single video,.m1-expand-single iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
  .m1-photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  @media(max-width:640px){.m1-photo-grid{grid-template-columns:repeat(2,1fr)}}
  .m1-photo{position:relative;aspect-ratio:1;overflow:hidden;border-radius:8px;background:#000}
  .m1-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s cubic-bezier(.2,.7,.3,1)}
  .m1-photo:hover img{transform:scale(1.05)}
  .m1-card-body{padding:32px 36px;display:flex;flex-direction:column;justify-content:center;gap:12px;border-left:1px solid var(--line)}
  @media(max-width:640px){.m1-card-body{padding:24px;border-left:none;border-top:1px solid var(--line)}}
  .m1-card-tag{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .m1-card-name{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(20px,2.2vw,28px);font-weight:600;letter-spacing:-.01em;line-height:1.1}
  .m1-card-desc{color:var(--muted);font-size:14px;line-height:1.68;max-width:480px}
  .m1-expand-close{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:24px;padding:12px;cursor:pointer;border:1px solid var(--line);border-radius:100px;width:fit-content;margin-left:auto;margin-right:auto;color:var(--muted);font-size:13px;font-weight:500;transition:color .2s,border-color .2s}
  .m1-expand-close:hover{color:var(--text);border-color:rgba(255,255,255,.35)}
  .m1-expand-close svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .m1-section-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:12px;margin-top:20px}
  .m1-section-label:first-child{margin-top:0}
</style>

const list = document.getElementById('m1List');

function buildExpandContent(p, stageEl) {
  stageEl.innerHTML = '';

  const hasMixed = p.media && p.media.length && p.images && p.images.length;

  if (hasMixed) {
    // Videos on top, photo grid below
    const videoLabel = document.createElement('div');
    videoLabel.className = 'm1-section-label';
    videoLabel.textContent = 'Videos';
    stageEl.appendChild(videoLabel);

    const grid = document.createElement('div'); grid.className = 'm1-expand-videos';
    p.media.forEach(item => {
      const w = document.createElement('div'); w.className = 'm1-expand-video';
      if (item.type === 'mp4') {
        const v = document.createElement('video');
        v.src = item.src; v.controls = true; v.playsInline = true;
        w.appendChild(v);
      } else {
        const f = document.createElement('iframe');
        f.src = 'https://www.youtube-nocookie.com/embed/' + item.id + '?rel=0&modestbranding=1&playsinline=1';
        f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        f.allowFullscreen = true;
        w.appendChild(f);
      }
      grid.appendChild(w);
    });
    stageEl.appendChild(grid);

    const photoLabel = document.createElement('div');
    photoLabel.className = 'm1-section-label';
    photoLabel.textContent = 'Photos';
    stageEl.appendChild(photoLabel);

    const photoGrid = document.createElement('div'); photoGrid.className = 'm1-photo-grid';
    p.images.forEach(src => {
      const cell = document.createElement('div'); cell.className = 'm1-photo';
      const img = document.createElement('img');
      img.src = src; img.loading = 'lazy';
      cell.appendChild(img); photoGrid.appendChild(cell);
    });
    stageEl.appendChild(photoGrid);

  } else if (p.videos && p.videos.length) {
    const grid = document.createElement('div'); grid.className = 'm1-expand-videos';
    p.videos.forEach(id => {
      const w = document.createElement('div'); w.className = 'm1-expand-video';
      const f = document.createElement('iframe');
      f.src = 'https://www.youtube-nocookie.com/embed/' + id + '?rel=0&modestbranding=1&playsinline=1';
      f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      f.allowFullscreen = true;
      w.appendChild(f); grid.appendChild(w);
    });
    stageEl.appendChild(grid);

  } else if (p.media && p.media.length === 1) {
    const item = p.media[0];
    const wrap = document.createElement('div'); wrap.className = 'm1-expand-single';
    if (item.type === 'mp4') {
      const v = document.createElement('video');
      v.src = item.src; v.controls = true; v.playsInline = true;
      wrap.appendChild(v);
    } else {
      const f = document.createElement('iframe');
      f.src = 'https://www.youtube-nocookie.com/embed/' + item.id + '?rel=0&modestbranding=1&playsinline=1';
      f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      f.allowFullscreen = true;
      wrap.appendChild(f);
    }
    stageEl.appendChild(wrap);

  } else if (p.media && p.media.length > 1) {
    const grid = document.createElement('div'); grid.className = 'm1-expand-videos';
    p.media.forEach(item => {
      const w = document.createElement('div'); w.className = 'm1-expand-video';
      if (item.type === 'mp4') {
        const v = document.createElement('video');
        v.src = item.src; v.controls = true; v.playsInline = true;
        w.appendChild(v);
      } else {
        const f = document.createElement('iframe');
        f.src = 'https://www.youtube-nocookie.com/embed/' + item.id + '?rel=0&modestbranding=1&playsinline=1';
        f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        f.allowFullscreen = true;
        w.appendChild(f);
      }
      grid.appendChild(w);
    });

  } else if (p.images && p.images.length) {
    const grid = document.createElement('div'); grid.className = 'm1-photo-grid';
    p.images.forEach(src => {
      const cell = document.createElement('div'); cell.className = 'm1-photo';
      const img = document.createElement('img');
      img.src = src; img.loading = 'lazy';
      cell.appendChild(img); grid.appendChild(cell);
    });
    stageEl.appendChild(grid);

      v.src = p.video; v.controls = true; v.playsInline = true;

  function toggle() {
    const open = expand.classList.contains('is-open');

      expand.classList.remove('is-open');
      card.classList.remove('expand-open');
      arrow.classList.remove('is-open');
      document.getElementById(stageId).innerHTML = '';
    } else {
      expand.classList.add('is-open');
      card.classList.add('expand-open');
      arrow.classList.add('is-open');
      buildExpandContent(p, document.getElementById(stageId));
    }
  }

  card.querySelector('.m1-card-media').addEventListener('click', toggle);
  arrow.addEventListener('click', toggle);
  document.getElementById('close-' + i).addEventListener('click', toggle);
});
</script>
</body>
</html>
